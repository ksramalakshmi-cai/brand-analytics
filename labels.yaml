# Brand detection method assignments
# -----------------------------------
# Per brand, choose which method has priority:
#   ocr      — OCR is primary (text-heavy logos, brand names in clear text)
#   detector — CLIP/YOLO is primary (visual/graphical logos, icons)
#   both     — use both OCR and detector (recommended when unsure)
#
# Usage:
#   python pipeline.py --input video.mp4 --mode both \
#       --detector reference --logos-dir logos/ --labels-file labels.yaml

google: ocr
coca cola: ocr
budweiser: both
toyota: detector
hyundai: detector
emirates: detector
aramco: detector
dp world: ocr
sobha: both
flipkart: ocr
royal stag: ocr
apollo: both
livpure: ocr
